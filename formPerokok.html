<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Survey Perokok</title>
</head>
<body>
    <h1>Formulir Survey Perokok</h1>
    <form>
        <div><label for="nama">Nama</label>
            <input type="text" id="nama">
        </div>
        <div><label for="umur">Umur</label>
            <input type="number" id="umur">
        </div>
        <div><label>Jenis Kelamin</label>
            <br>
            <input type="radio" name="gender" id="L"><label for="L">Laki-laki</label>
            <input type="radio" name="gender" id="P"><label for="P">Perempuan</label>
        </div>
        <div><label>Apakah anda seorang perokok?</label>
            <select name="" id="">
                <option value="" disabled selected>Pilih</option>
                <option value="">Ya</option>
                <option value="">Tidak</option>
            </select>
        </div>
        <div><label>Brand rokok yang digunakan</label>
            <br>
            <input type="checkbox" name="rokok" id="s"><label for="s">Sampoerna</label>
            <input type="checkbox" name="rokok" id="gg"><label for="gg">Gudang Garam</label>
            <input type="checkbox" name="rokok" id="dj"><label for="dj">Djarum</label>
        </div>
        <button type="submit">Kirim</button>
    </form>
</body>
</html>
